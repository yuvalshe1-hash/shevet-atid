<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #3b1f6e;
    --forest-mid: #6d3fc0;
    --forest-light: #9b6de8;
    --bark: #5c3a9e;
    --sand: #fffbe6;
    --cream: #fdf9ff;
    --ember: #f5c518;
    --sky: #e0c8ff;
    --text: #1a1a1a;
    --muted: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--forest);
    color: white;
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -0.5px;
  }

  .logo-icon { font-size: 2rem; }

  .header-actions { display: flex; gap: 0.8rem; align-items: center; }

  .btn {
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.2s;
  }

  .btn-outline {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.4);
    color: white;
  }
  .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: white; }

  .btn-primary {
    background: var(--forest-light);
    color: white;
  }
  .btn-primary:hover { background: #3da06e; transform: translateY(-1px); }

  .btn-danger { background: #dc2626; color: white; }
  .btn-danger:hover { background: #b91c1c; }

  .btn-ember { background: var(--ember); color: #1a1a1a; font-weight: 800; }
  .btn-ember:hover { background: #d4aa10; transform: translateY(-1px); }

  /* MAIN LAYOUT */
  main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

  /* TRIBE BANNER */
  .tribe-banner {
    text-align: center;
    padding: 1rem 1rem 0.8rem;
    margin-bottom: 0.5rem;
  }
  .tribe-banner h1 {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--forest);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .tribe-banner p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* CALENDAR NAV */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .cal-nav h2 {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--forest);
  }

  .nav-arrows { display: flex; gap: 0.5rem; }

  .arrow-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--forest-mid);
    background: white;
    color: var(--forest);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .arrow-btn:hover { background: var(--forest); color: white; }

<script>
// ── SUPABASE ───────────────────────────────────────────
const SUPABASE_URL = 'https://excbwdkkrndnsrijebvr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4czs-h_sKFsuTHSkDheJnw_9LIahKFJ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_USER = 'yuvalse';
const ADMIN_PASS = 'Ys3366';

const DEFAULT_CATEGORIES = [
  { id: 'c1',  name: 'פעולות',                color: '#6d3fc0' },
  { id: 'c2',  name: 'חגים',                  color: '#c9a000' },
  { id: 'c3',  name: 'ישיבת ריכוז',           color: '#1d6fb5' },

  { id: 'c6',  name: 'פורומים',               color: '#0e7c7b' },
  { id: 'c7',  name: 'ישיבות פורום',          color: '#1a7a3e' },
  { id: 'c8',  name: 'ימי עבודה',             color: '#d4600a' },
  { id: 'c9',  name: 'פעילים',                color: '#3b1f6e' },
  { id: 'c10', name: 'תחום ההדרכה',           color: '#7c3aed' },
  { id: 'c11', name: 'שבת חופשית',            color: '#dc2626' },
];

let isAdmin = false;
let currentDate = new Date();
let editingEventId = null;
let events = [];
let categories = DEFAULT_CATEGORIES;

// ── SUPABASE DATA ──────────────────────────────────────
async function loadData() {
  showLoading(true);
  try {
    const { data: evData } = await sb.from('events').select('*');
    events = (evData || []).map(r => ({ ...r.data, id: r.id }));

    const { data: catData } = await sb.from('categories').select('*');
    if (catData && catData.length > 0) {
      categories = catData.map(r => r.data);
    } else {
      for (const c of DEFAULT_CATEGORIES) {
        await sb.from('categories').upsert({ id: c.id, data: c });
      }
      categories = DEFAULT_CATEGORIES;
    }
  } catch(e) { console.error('Load error', e); }
  showLoading(false);
  renderLegend();
  renderCalendar();
}

async function saveEventToCloud(ev) {
  const { id, ...data } = ev;
  if (id) {
    await sb.from('events').update({ data }).eq('id', id);
  } else {
    const { data: res } = await sb.from('events').insert({ data }).select();
    if (res && res[0]) ev.id = res[0].id;
  }
}

async function insertEventToCloud(ev) {
  const { data: res } = await sb.from('events').insert({ data: ev }).select();
  if (res && res[0]) ev.id = res[0].id;
  return ev;
}

async function deleteEventFromCloud(id) {
  await sb.from('events').delete().eq('id', id);
}

async function saveCategoryToCloud(cat) {
  await sb.from('categories').upsert({ id: cat.id, data: cat });
}

async function deleteCategoryFromCloud(id) {
  await sb.from('categories').delete().eq('id', id);
}

function showLoading(on) {
  document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
}

// ── HELPERS ────────────────────────────────────────────
const MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function dateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function formatDate(str) {
  const d = new Date(str + 'T12:00:00');
  return `${d.getDate()} ${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;
}
function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  return `${h}:${m}`;
}
function getCat(id) { return categories.find(c => c.id === id); }

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 160;
}

// ── CALENDAR ───────────────────────────────────────────
function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${MONTHS_HE[month]} ${year}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const today = new Date();

  let cells = [];
  for (let i = firstDay - 1; i >= 0; i--)
    cells.push({ day: daysInPrev - i, month: month - 1, year, other: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ day: d, month, year, other: false });
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++)
    cells.push({ day: d, month: month + 1, year, other: true });

  cells.forEach(c => {
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (c.other ? ' other-month' : '');

    const am = c.other ? (c.month < 0 ? 11 : c.month > 11 ? 0 : c.month) : c.month;
    const ay = c.other ? (c.month < 0 ? c.year-1 : c.month > 11 ? c.year+1 : c.year) : c.year;
    const ds = dateStr(ay, am, c.day);

    const isToday = !c.other && c.day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    if (isToday) cell.classList.add('today');

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num';
    numDiv.textContent = c.day;
    if (isAdmin) {
      numDiv.style.cursor = 'pointer';
      numDiv.title = 'הוסף אירוע ליום זה';
      numDiv.onclick = () => openAddEventOnDate(ds);
    }
    cell.appendChild(numDiv);

    const dayEvents = events.filter(ev => {
      // Check exceptions: if this date is cancelled, skip
      const exceptions = ev.exceptions || [];
      const exc = exceptions.find(e => e.originalDate === ds);
      if (exc && exc.cancelled) return false;
      // If this date is a "movedTo" target, include it
      const movedHere = exceptions.some(e => e.movedTo === ds && !e.cancelled);
      if (movedHere) return true;
      // Direct date range match (non-recurring)
      const end = ev.dateEnd || ev.date;
      if (!ev.recur && ds >= ev.date && ds <= end) return true;
      // Recurring: skip if this date was moved away
      if (exc && exc.movedTo) return false;
      if (!ev.recur || !ev.recurEnd || ds < ev.date || ds > ev.recurEnd) return false;
      const startD = new Date(ev.date + 'T12:00:00');
      const checkD = new Date(ds + 'T12:00:00');
      const diffDays = Math.round((checkD - startD) / 86400000);
      if (ev.recur === 'weekly')   return diffDays % 7 === 0;
      if (ev.recur === 'biweekly') return diffDays % 14 === 0;
      if (ev.recur === 'monthly')  return checkD.getDate() === startD.getDate();
      return false;
    });

    dayEvents.forEach(ev => {
      const cat = getCat(ev.categoryId);
      const bg = cat ? cat.color : '#6d3fc0';
      const textColor = isLight(bg) ? '#1a1a1a' : 'white';
      const pill = document.createElement('div');
      pill.className = 'event-pill';
      pill.style.background = bg;
      pill.style.color = textColor;
      // Find the "original date" for this occurrence (for moved exceptions)
      const exceptions = ev.exceptions || [];
      const movedExc = exceptions.find(e => e.movedTo === ds);
      const originalDate = movedExc ? movedExc.originalDate : ds;
      let label = ev.title;
      // Show moved time if applicable
      const exc = exceptions.find(e => e.originalDate === originalDate);
      const dispTime = exc && exc.timeStart ? exc.timeStart : ev.timeStart;
      if (dispTime) label = `${formatTime(dispTime)} ${ev.title}`;
      pill.textContent = label;
      pill.onclick = () => viewEvent(ev.id, originalDate);
      cell.appendChild(pill);
    });

    grid.appendChild(cell);
  });
}

function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  renderCalendar();
}

// ── AUTH ───────────────────────────────────────────────
function openLogin() { openModal('loginModal'); }

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    isAdmin = true;
    closeModal('loginModal');
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').style.display = 'none';
    updateAdminUI();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() { isAdmin = false; updateAdminUI(); }

function updateAdminUI() {
  const ha = document.getElementById('headerActions');
  const addBtn = document.getElementById('addEventBtn');
  if (isAdmin) {
    ha.innerHTML = `<span class="admin-badge">מנהל</span><button class="btn btn-outline" onclick="doLogout()">יציאה</button>`;
    addBtn.style.display = 'block';
  } else {
    ha.innerHTML = `<button class="btn btn-outline" onclick="openLogin()">כניסת מנהל</button>`;
    addBtn.style.display = 'none';
  }
  renderLegend();
}

  document.getElementById('evTitle').value = '';

  document.getElementById('evDateEnd').value = '';
  document.getElementById('evTimeStart').value = '';
  document.getElementById('evTimeEnd').value = '';
  document.getElementById('evDesc').value = '';
  document.getElementById('evRecur').value = '';
  document.getElementById('evRecurEnd').value = '';
  document.getElementById('recurEndGroup').style.display = 'none';

function openAddEventOnDate(date) {
  editingEventId = null;
  document.getElementById('evTitle').value = '';
  document.getElementById('evDate').value = date;
  document.getElementById('evDateEnd').value = '';
  document.getElementById('evTimeStart').value = '';
  document.getElementById('evTimeEnd').value = '';
  document.getElementById('evDesc').value = '';
  document.getElementById('evRecur').value = '';
  document.getElementById('evRecurEnd').value = '';
  document.getElementById('recurEndGroup').style.display = 'none';
  renderCategorySelect('');

}

function toggleRecurEnd() {
  const val = document.getElementById('evRecur').value;
  document.getElementById('recurEndGroup').style.display = val ? 'block' : 'none';
}

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  const date = document.getElementById('evDate').value;
  const dateEnd = document.getElementById('evDateEnd').value;
  const timeStart = document.getElementById('evTimeStart').value;
  const timeEnd = document.getElementById('evTimeEnd').value;
  const desc = document.getElementById('evDesc').value.trim();
  const categoryId = document.getElementById('evCategory').value;
  const recur = document.getElementById('evRecur').value;
  const recurEnd = document.getElementById('evRecurEnd').value;
  if (!title || !date) return alert('נא למלא שם ותאריך התחלה');
  if (dateEnd && dateEnd < date) return alert('תאריך הסיום חייב להיות אחרי תאריך ההתחלה');
  if (recur && !recurEnd) return alert('נא לציין תאריך סיום לחזרה');

  showLoading(true);
  const data = { title, date, dateEnd: dateEnd || '', timeStart, timeEnd, desc, categoryId, recur, recurEnd };

  if (editingEventId) {
    const idx = events.findIndex(e => e.id === editingEventId);
    if (idx >= 0) {
      events[idx] = { ...events[idx], ...data };
      await saveEventToCloud(events[idx]);
    }
  } else {
    const newEv = await insertEventToCloud(data);
    events.push(newEv);
  }
  showLoading(false);
  closeModal('addEventModal');
  renderCalendar();
}

let currentViewDate = null; // the specific date clicked for recurring events

function viewEvent(id, clickedDate) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  currentViewDate = clickedDate || ev.date;

  document.getElementById('veTitle').textContent = ev.title;

  const catBadge = document.getElementById('veCatBadge');
  const cat = getCat(ev.categoryId);
  if (cat) {
    const textColor = isLight(cat.color) ? '#1a1a1a' : 'white';
    catBadge.innerHTML = `<span style="background:${cat.color};color:${textColor};padding:3px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;">${cat.name}</span>`;
    catBadge.style.display = 'block';
  } else { catBadge.style.display = 'none'; }

  // Show the specific occurrence date for recurring events
  const displayDate = (ev.recur && clickedDate) ? clickedDate : ev.date;
  let dateLabel = formatDate(displayDate);
  if (!ev.recur && ev.dateEnd && ev.dateEnd !== ev.date) dateLabel += ` – ${formatDate(ev.dateEnd)}`;
  document.getElementById('veDate').textContent = '📅 ' + dateLabel;

  const timeEl = document.getElementById('veTime');
  // Check if this occurrence has an exception override
  const exc = (ev.exceptions || []).find(e => e.originalDate === clickedDate);
  const dispTimeStart = exc ? exc.timeStart : ev.timeStart;
  const dispTimeEnd   = exc ? exc.timeEnd   : ev.timeEnd;
  if (dispTimeStart) {
    let timeLabel = '🕐 ' + formatTime(dispTimeStart);
    if (dispTimeEnd) timeLabel += ` – ${formatTime(dispTimeEnd)}`;
    timeEl.textContent = timeLabel;
    timeEl.style.display = 'block';
  } else { timeEl.style.display = 'none'; }

  const recurEl = document.getElementById('veRecur');
  if (ev.recur) {
    const recurLabels = { weekly: 'כל שבוע', biweekly: 'כל שבועיים', monthly: 'כל חודש' };
    recurEl.textContent = `🔁 חוזר ${recurLabels[ev.recur]} עד ${formatDate(ev.recurEnd)}`;
    recurEl.style.display = 'block';
  } else { recurEl.style.display = 'none'; }

  const descEl = document.getElementById('veDesc');
  if (ev.desc) { descEl.textContent = ev.desc; descEl.style.display = 'block'; }
  else { descEl.style.display = 'none'; }

  const actions = document.getElementById('veActions');
  if (isAdmin) {
    const isRecurOccurrence = ev.recur && clickedDate && clickedDate !== ev.date;
    const exceptionBtn = isRecurOccurrence
      ? `<button class="btn btn-outline" style="border-color:#d4600a;color:#d4600a;" onclick="openExceptionModal('${id}','${clickedDate}')">✏️ שנה רק יום זה</button>`
      : '';
    actions.innerHTML = `
      <button class="btn btn-primary" onclick="editEvent('${id}')">עריכת הסדרה</button>
      ${exceptionBtn}
      <button class="btn btn-danger" onclick="deleteEvent('${id}')">מחק הכל</button>
      <button class="btn btn-outline" style="border-color:#e5e7eb;color:#374151;" onclick="closeModal('viewEventModal')">סגור</button>`;
  } else {
    actions.innerHTML = `<button class="btn btn-outline" style="border-color:#e5e7eb;color:#374151;" onclick="closeModal('viewEventModal')">סגור</button>`;
  }
  openModal('viewEventModal');
}

let exceptionEventId = null;
let exceptionOrigDate = null;

function openExceptionModal(id, originalDate) {
  exceptionEventId = id;
  exceptionOrigDate = originalDate;
  const ev = events.find(e => e.id === id);
  document.getElementById('exTitle').textContent = ev.title;
  document.getElementById('exSubtitle').textContent = `שינוי עבור: ${formatDate(originalDate)}`;
  document.getElementById('exNewDate').value = originalDate;
  // Pre-fill existing exception if any
  const exc = (ev.exceptions || []).find(e => e.originalDate === originalDate);
  document.getElementById('exTimeStart').value = exc ? (exc.timeStart || ev.timeStart || '') : (ev.timeStart || '');
  document.getElementById('exTimeEnd').value   = exc ? (exc.timeEnd   || ev.timeEnd   || '') : (ev.timeEnd   || '');
  closeModal('viewEventModal');
  openModal('exceptionModal');
}

async function saveException(type) {
  const ev = events.find(e => e.id === exceptionEventId);
  if (!ev) return;
  if (!ev.exceptions) ev.exceptions = [];
  ev.exceptions = ev.exceptions.filter(e => e.originalDate !== exceptionOrigDate);

  if (type === 'cancel') {
    ev.exceptions.push({ originalDate: exceptionOrigDate, cancelled: true });
  } else {
    const newDate   = document.getElementById('exNewDate').value;
    const timeStart = document.getElementById('exTimeStart').value;
    const timeEnd   = document.getElementById('exTimeEnd').value;
    if (!newDate) return alert('נא לבחור תאריך');
    ev.exceptions.push({ originalDate: exceptionOrigDate, movedTo: newDate, timeStart, timeEnd });
  }
  showLoading(true);
  await saveEventToCloud(ev);
  showLoading(false);
  closeModal('exceptionModal');
  renderCalendar();
}

function editEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  closeModal('viewEventModal');
  editingEventId = id;
  document.getElementById('evTitle').value = ev.title;
  document.getElementById('evDate').value = ev.date;
  document.getElementById('evDateEnd').value = ev.dateEnd || '';
  document.getElementById('evTimeStart').value = ev.timeStart || '';
  document.getElementById('evTimeEnd').value = ev.timeEnd || '';
  document.getElementById('evDesc').value = ev.desc || '';
  document.getElementById('evRecur').value = ev.recur || '';
  document.getElementById('evRecurEnd').value = ev.recurEnd || '';
  document.getElementById('recurEndGroup').style.display = ev.recur ? 'block' : 'none';
  renderCategorySelect(ev.categoryId || '');
  document.querySelector('#addEventModal h3').textContent = '✏️ עריכת אירוע';
  openModal('addEventModal');
}

async function deleteEvent(id) {
  if (!confirm('למחוק את האירוע?')) return;
  showLoading(true);
  await deleteEventFromCloud(id);
  events = events.filter(e => e.id !== id);
  showLoading(false);
  closeModal('viewEventModal');
  renderCalendar();
}

// ── CATEGORY MANAGEMENT ────────────────────────────────
function openCatModal() {
  renderCatList();
  openModal('catModal');
}

function renderCatList() {
  const list = document.getElementById('catList');
  list.innerHTML = '';
  categories.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <span class="cat-swatch" style="background:${cat.color}"></span>
      <span class="cat-name">${cat.name}</span>
      <button class="cat-del" onclick="deleteCategory('${cat.id}')" title="מחק">✕</button>`;
    list.appendChild(row);
  });
}

async function addCategory() {
  const name = document.getElementById('newCatName').value.trim();
  const color = document.getElementById('newCatColor').value;
  if (!name) return;
  const cat = { id: 'c' + Date.now(), name, color };
  categories.push(cat);
  await saveCategoryToCloud(cat);
  document.getElementById('newCatName').value = '';
  renderCatList();
  renderLegend();
}

async function deleteCategory(id) {
  if (!confirm('למחוק קטגוריה זו?')) return;
  categories = categories.filter(c => c.id !== id);
  await deleteCategoryFromCloud(id);
  renderCatList();
  renderLegend();
  renderCalendar();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});
